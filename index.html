<body class="grid-bg">
    <nav class="navbar glass-nav"><div class="container nav-inner">
        <a href="https://quickutils.top" class="brand holo-text">🔐 Escape Room</a>
        <div class="nav-links">
            <a href="https://ko-fi.com/dayatin" target="_blank" class="kofi-link">☕ Support</a>
            <button id="themeBtn" class="theme-btn">🌙</button>
        </div>
    </div></nav>
    <main class="container py-4">
        <div class="hero-section text-center mb-4"><h1 class="gradient-text">Escape Room</h1><p class="text-muted">Solve puzzles to escape each room!</p></div>
    <div class="glass-card p-4" id="gameArea">
        <div id="roomDisplay"></div>
        <div id="puzzle" class="mt-3"></div>
        <input type="text" id="answerInput" class="form-control mt-3" placeholder="Enter your answer...">
        <button class="btn btn-primary mt-2" id="submitAnswer">Submit</button>
        <div id="feedback" class="mt-3" style="font-weight:700;"></div>
        <div class="mt-3 text-muted">Room: <strong id="roomNum">1</strong>/5 | Hints: <strong id="hintsLeft">3</strong> <button class="btn btn-sm btn-secondary" id="hintBtn">💡 Hint</button></div>
    </div>
    </main>
    <footer class="footer"><div class="container copyright text-center py-4">© 2026 QuickUtils. All rights reserved.</div></footer>
